<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #0a0f16; margin: 0; }
        .nav {
            position: relative;
            height: 80px;
            background: rgba(10, 15, 22, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
        }
        .nav-logo-placeholder { margin-left: 20px; color: white; font-size: 24px; font-family: sans-serif; font-weight: bold; position: relative; z-index: 10; }
        
        .nav-pcb-bg {
            position: absolute;
            top: 0;
            left: 200px;
            width: calc(100% - 200px);
            height: 100%;
            pointer-events: none;
            opacity: 0.4;
            z-index: 1;
        }
        .pcb-trace {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-dasharray: 800;
            stroke-dashoffset: 800;
            animation: drawTrace 3s ease-out forwards;
        }
        .pcb-node {
            fill: none;
            stroke: rgba(255, 255, 255, 0.3);
            opacity: 0;
            animation: fadeInNode 0.5s ease forwards;
        }
        
        /* Delays for drawing */
        .t-1 { animation-delay: 0.2s; } .n-1 { animation-delay: 2.5s; }
        .t-2 { animation-delay: 0.8s; } .n-2 { animation-delay: 3.1s; }
        .t-3 { animation-delay: 1.4s; } .n-3 { animation-delay: 3.7s; }
        .t-4 { animation-delay: 2.0s; } .n-4 { animation-delay: 4.3s; }
        .t-5 { animation-delay: 2.6s; } .n-5 { animation-delay: 4.9s; }
        
        @keyframes drawTrace {
            to { stroke-dashoffset: 0; }
        }
        @keyframes fadeInNode {
            to { opacity: 1; fill: #fde68a; stroke: #fde68a; filter: drop-shadow(0 0 3px rgba(253, 230, 138, 0.8)); }
        }
        
        /* Subtle pulse for the whole SVG after drawing */
        .nav-pcb-bg {
            animation: pulseBg 6s ease-in-out infinite alternate 5s;
        }
        @keyframes pulseBg {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo-placeholder">LEGACYMICRO</div>
        
        <!-- Premium PCB background -->
        <svg class="nav-pcb-bg" viewBox="0 0 800 100" preserveAspectRatio="xMinYMid slice">
            <g stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path class="pcb-trace t-1" d="M 0 50 L 50 50 L 70 70 L 150 70 L 170 50 L 350 50 L 370 30 L 500 30" />
                <circle cx="500" cy="30" r="3" class="pcb-node n-1" />
                
                <path class="pcb-trace t-2" d="M 20 20 L 60 20 L 90 50 L 180 50 L 200 70 L 450 70 L 470 50 L 600 50" />
                <circle cx="600" cy="50" r="3" class="pcb-node n-2" />
                
                <path class="pcb-trace t-3" d="M 10 80 L 100 80 L 120 60 L 280 60 L 310 90 L 500 90 L 520 70 L 700 70" />
                <circle cx="700" cy="70" r="3" class="pcb-node n-3" />
                
                <!-- Interconnections -->
                <path class="pcb-trace t-4" d="M 150 70 L 180 100 L 270 100 L 290 80 L 400 80" />
                <circle cx="400" cy="80" r="2.5" class="pcb-node n-4" />
                
                <path class="pcb-trace t-5" d="M 350 50 L 380 20 L 480 20 L 510 50 L 650 50" />
                <circle cx="650" cy="50" r="2.5" class="pcb-node n-5" />
            </g>
        </svg>
    </nav>
</body>
</html>
