<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: #09090b; margin: 0; padding: 50px; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .logo-wrapper {
            position: relative;
            width: 320px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            position: relative;
            z-index: 10;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: baseline;
        }
        .legacy { color: #fef3c7; } /* Warm white/champagne */
        .micro { color: #3b82f6; transform: scaleX(1.05) skewX(-14deg); margin-left: -0.35em; letter-spacing: 0.5px; }

        /* Premium PCB Background */
        .nav-pcb-bg {
            position: absolute;
            top: 0;
            left: -20px;
            width: 360px;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Static structure */
        .pcb-base { stroke: rgba(255, 255, 255, 0.04); stroke-width: 1.5; fill: none; stroke-linejoin: bevel; }
        .pcb-base-thin { stroke: rgba(255, 255, 255, 0.02); stroke-width: 0.75; fill: none; stroke-linejoin: bevel; }

        /* Animated Traces */
        .trace-line {
            fill: none;
            stroke-linejoin: bevel;
            stroke-linecap: round;
        }
        
        .trace-gold { stroke: rgba(253, 230, 138, 0.35); stroke-width: 1.5; }
        .trace-blue { stroke: rgba(59, 130, 246, 0.35); stroke-width: 1.5; }

        /* Data packet flow effect */
        .data-packet {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: bevel;
            stroke-dasharray: 10 300;
        }
        .packet-gold { stroke: #fde68a; filter: drop-shadow(0 0 4px rgba(253, 230, 138, 0.8)); }
        .packet-blue { stroke: #60a5fa; filter: drop-shadow(0 0 4px rgba(96, 165, 250, 0.8)); }

        .draw-in {
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: drawTrace 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .flow-1 { animation: flowData 4s linear infinite 1s; }
        .flow-2 { animation: flowData 5s linear infinite 2s; }
        .flow-3 { animation: flowData 3.5s linear infinite 0.5s; }

        @keyframes drawTrace { to { stroke-dashoffset: 0; } }
        @keyframes flowData {
            0% { stroke-dashoffset: 310; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { stroke-dashoffset: -10; opacity: 0; }
        }

        .pcb-via {
            opacity: 0;
            animation: fadeInVia 0.5s ease forwards;
        }
        .via-gold { fill: #fde68a; filter: drop-shadow(0 0 3px rgba(253, 230, 138, 0.5)); }
        .via-blue { fill: #3b82f6; filter: drop-shadow(0 0 3px rgba(59, 130, 246, 0.5)); }
        .via-dark { fill: #09090b; stroke-width: 1; }
        
        .v-1 { animation-delay: 2s; }
        .v-2 { animation-delay: 2.5s; }
        .v-3 { animation-delay: 2.2s; }

        @keyframes fadeInVia { to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="logo-wrapper">
        <svg class="nav-pcb-bg" viewBox="0 0 360 100" preserveAspectRatio="xMidYMid slice">
            <!-- Background structure bus lines -->
            <g class="pcb-base">
                <path d="M 0 85 L 120 85 L 135 70 L 260 70 L 275 85 L 360 85" />
                <path d="M 0 90 L 115 90 L 135 75 L 255 75 L 275 95 L 360 95" />
                <path d="M 0 95 L 110 95 L 135 80 L 250 80 L 275 105" />
            </g>
            <g class="pcb-base-thin">
                <path d="M 30 0 L 50 20 L 120 20 L 130 10 L 200 10 L 220 30 L 360 30" />
                <path d="M 40 0 L 60 20 L 115 20 L 125 10 L 205 10 L 225 30 L 360 30" />
            </g>

            <!-- Animated structural traces -->
            <!-- Gold Trace (Legacy Side) -->
            <path class="trace-line trace-gold draw-in" style="animation-delay: 0.5s" d="M 10 60 L 40 60 L 60 40 L 130 40 L 150 20 L 200 20" />
            <!-- Data packet riding the gold trace -->
            <path class="data-packet packet-gold flow-1" d="M 10 60 L 40 60 L 60 40 L 130 40 L 150 20 L 200 20" />
            <!-- Vias for Gold Trace -->
            <g class="pcb-via v-1">
                <circle cx="130" cy="40" r="2.5" class="via-gold" />
                <circle cx="200" cy="20" r="3.5" class="via-gold" />
                <circle cx="200" cy="20" r="1.5" class="via-dark" />
            </g>

            <!-- Blue Trace (Micro Side) -->
            <path class="trace-line trace-blue draw-in" style="animation-delay: 0.8s" d="M 160 80 L 180 60 L 280 60 L 300 40 L 350 40" />
            <!-- Data packet riding the blue trace -->
            <path class="data-packet packet-blue flow-2" d="M 160 80 L 180 60 L 280 60 L 300 40 L 350 40" />
            <!-- Vias for Blue Trace -->
            <g class="pcb-via v-2">
                <circle cx="180" cy="60" r="2.5" class="via-blue" />
                <circle cx="300" cy="40" r="3.5" class="via-blue" />
                <circle cx="300" cy="40" r="1.5" class="via-dark" />
            </g>

            <!-- Mixed Central Trace -->
            <path class="trace-line trace-gold draw-in" style="animation-delay: 1.1s" d="M 80 20 L 100 40 L 170 40 L 190 60 L 240 60" />
            <path class="data-packet packet-gold flow-3" d="M 80 20 L 100 40 L 170 40 L 190 60 L 240 60" />
            <g class="pcb-via v-3">
                <circle cx="170" cy="40" r="2.5" class="via-gold" />
            </g>
        </svg>

        <div class="logo-text">
            <span class="legacy">LEGACY</span><span class="micro">MICRO</span>
        </div>
    </div>
</body>
</html>
