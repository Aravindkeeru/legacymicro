<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    background-color: #09090b;
    color: white;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  
  :root {
    --accent: #3b82f6;
  }

  .nav-logo { 
    display: flex; 
    align-items: center; 
    text-decoration: none; 
    color: white;
    cursor: pointer;
    position: relative;
    width: 300px;
    height: 60px;
  }

  .logo-text-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 280px;
  }

  .logo-top-line {
    position: relative;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.5rem; /* Larger for test */
  }

  /* Initial Mu */
  .logo-init-mu {
    position: absolute;
    color: var(--accent);
    font-family: 'Times New Roman', Times, serif;
    font-style: italic;
    font-size: 2.2rem;
    animation: fadeMuOut 0.8s 0.5s forwards;
    z-index: 5;
    pointer-events: none;
  }

  @keyframes fadeMuOut {
    0% { opacity: 0; transform: scale(0.5); }
    10% { opacity: 1; transform: scale(1.1); }
    30% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.8); visibility: hidden; }
  }

  /* Primary State */
  .logo-primary {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 2;
  }
  
  /* The single typographic element */
  .logo-main-text {
    /* 5.5 letters out of 11 is 50%. Let's put the stop exactly at 50% */
    background: linear-gradient(to right, #ffffff 51%, var(--accent) 51%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
    /* Expanding animation */
    opacity: 0;
    clip-path: inset(0 50% 0 50%);
    animation: textWipeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.0s forwards;
  }

  @keyframes textWipeIn {
    0% { opacity: 0; clip-path: inset(0 50% 0 50%); letter-spacing: -2px; transform: scale(0.95); }
    10% { opacity: 1; }
    100% { opacity: 1; clip-path: inset(0 0 0 0); letter-spacing: -0.5px; transform: scale(1); }
  }

  /* Trusted State */
  .logo-hover {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    align-items: baseline;
    justify-content: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 3;
    pointer-events: none;
  }
  .logo-tr, .logo-sted { color: #ffffff; }
  .logo-trusted-mu {
    color: var(--accent);
    font-family: 'Times New Roman', Times, serif;
    font-style: italic;
    font-size: 1.15em;
    margin: 0 0.05em;
  }

  /* Hover logic */
  .nav-logo:hover .logo-primary {
    opacity: 0;
    transform: translateY(-10px) scale(0.95);
  }
  
  .nav-logo:hover .logo-hover {
    opacity: 1;
    transform: translateY(0);
  }

  /* Subtitle */
  .logo-subtitle {
    font-size: 0.48em; 
    letter-spacing: 1.5px; 
    color: #888; 
    font-weight: 600; 
    margin-top: 5px;
    opacity: 0;
    transform: translateY(5px);
    animation: fadeSubtitle 1s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards;
    transition: transform 0.4s ease, color 0.4s ease;
  }
  @keyframes fadeSubtitle {
    100% { opacity: 1; transform: translateY(0); }
  }

  .nav-logo:hover .logo-subtitle {
    transform: translateX(12px);
    color: #aaa;
  }

</style>
</head>
<body>

  <a href="#" class="nav-logo">
    
      <span class="logo-subtitle">ELECTRONIC COMPONENTS</span>
    </div>
  </a>

</body>
</html>
