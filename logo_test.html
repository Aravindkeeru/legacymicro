<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    background-color: #09090b;
    color: white;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  
  /* Original variables */
  :root {
    --accent: #3b82f6; /* Blue */
  }

  /* Logo Animation Container */
  .nav-logo { 
    display: flex; 
    align-items: center; 
    text-decoration: none; 
    color: white;
    cursor: pointer;
  }
  
  .logo-text-wrapper {
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    line-height: 1;
  }

  .logo-top-line {
    font-weight: 800; 
    letter-spacing: -0.5px; 
    font-size: 2.5rem; /* Larger for testing */
    display: flex; 
    align-items: baseline;
    position: relative;
  }

  /* 1. Slower transition */
  .logo-legacy-group {
    display: inline-flex;
    align-items: baseline;
    opacity: 0;
    /* Increased from 1s to 2s for noticeability */
    animation: slideLegacyOut 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; 
  }
  
  .logo-legacy { 
    color: #ffffff; /* LEGAC in white */
    transition: color 0.5s ease; 
  }
  
  /* 2. Joining Y and M */
  .logo-y {
    /* Left half white, right half blue */
    background: linear-gradient(to right, #ffffff 50%, var(--accent) 50%);
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    position: relative; 
    z-index: 2;
    transition: all 0.5s ease;
  }
  
  .logo-micro-group {
    display: inline-flex;
    align-items: baseline;
    /* Slower fade */
    animation: microFade 1.5s ease-out 1s forwards;
    opacity: 0;
    position: relative;
  }
  
  /* The M has a negative margin to overlap the Y */
  .logo-m {
    color: var(--accent);
    margin-left: -0.45em; /* Adjusted to overlap the right arm of Y */
    clip-path: polygon(30% 0, 100% 0, 100% 100%, 30% 100%); /* Clip left arm so they join */
    position: relative;
    z-index: 1;
    transition: opacity 0.4s ease;
  }
  
  .logo-icro {
    color: var(--accent);
    margin-left: -0.05em;
    transition: opacity 0.4s ease;
  }

  /* The hidden 'μ' symbol */
  .logo-mu {
    position: absolute;
    left: -0.45em; /* Align with M */
    color: var(--accent);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
    pointer-events: none;
    font-family: 'Times New Roman', serif; /* Better looking mu */
    font-style: italic;
  }

  /* 3. Transition on Hover */
  .nav-logo:hover .logo-m,
  .nav-logo:hover .logo-icro {
    opacity: 0; /* Hide MICRO */
  }
  
  .nav-logo:hover .logo-mu {
    opacity: 1; /* Show μ */
    transform: translateY(0);
  }

  /* Hover legacy turns completely white or stays white */
  .nav-logo:hover .logo-legacy { color: #ffffff !important; }
  .nav-logo:hover .logo-y { 
    background: linear-gradient(to right, #ffffff 50%, var(--accent) 50%) !important; 
    -webkit-background-clip: text !important; 
    -webkit-text-fill-color: transparent !important; 
  }

  @keyframes microFade {
    0% { opacity: 0; transform: scale(0.95); }
    100% { opacity: 1; transform: scale(1); }
  }
  
  @keyframes slideLegacyOut {
    0% {
      opacity: 0;
      transform: translateX(40px);
      clip-path: inset(0 100% 0 0);
    }
    100% {
      opacity: 1;
      transform: translateX(0);
      clip-path: inset(0 -20px 0 0);
    }
  }

  .subtitle {
    font-size: 0.8rem; 
    letter-spacing: 2px; 
    color: #888; 
    font-weight: 600; 
    margin-top: 5px;
  }
</style>
</head>
<body>

  <a href="#" class="nav-logo">
    <div class="logo-text-wrapper">
      <span class="logo-top-line">
        <span class="logo-legacy-group">
          <span class="logo-legacy">LEGAC</span>
          <span class="logo-y">Y</span>
        </span>
        <span class="logo-micro-group">
          <span class="logo-m">M</span>
          <span class="logo-icro">ICRO</span>
          <span class="logo-mu">μ</span>
        </span>
      </span>
      <span class="subtitle">ELECTRONIC COMPONENTS</span>
    </div>
  </a>

</body>
</html>
