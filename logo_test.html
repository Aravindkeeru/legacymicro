<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    background-color: #09090b;
    color: white;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  
  :root {
    --accent: #3b82f6;
  }

  .nav-logo { 
    display: flex; 
    align-items: center; 
    text-decoration: none; 
    color: white;
    cursor: pointer;
    position: relative;
  }
  
  .logo-text-wrapper {
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; /* Center everything */
    line-height: 1;
    position: relative;
    width: 280px; /* Fixed width to prevent jumping */
  }

  .logo-top-line {
    font-weight: 800; 
    letter-spacing: -0.5px; 
    font-size: 1.5rem; /* Larger for test */
    display: flex; 
    align-items: center;
    justify-content: center;
    position: relative;
    height: 1.2em;
    width: 100%;
  }

  /* 1. Initial Mu State */
  .logo-init-mu {
    position: absolute;
    color: var(--accent);
    font-family: 'Times New Roman', Times, serif;
    font-style: italic;
    font-size: 1.8rem;
    opacity: 1;
    animation: initialMuFade 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    z-index: 3;
  }

  @keyframes initialMuFade {
    0% { transform: scale(0.5); opacity: 0; }
    20% { transform: scale(1.2); opacity: 1; }
    60% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; visibility: hidden; }
  }

  /* 2. Legacy Micro State (Expands from center) */
  .logo-legacy-micro {
    position: absolute;
    display: flex;
    align-items: baseline;
    opacity: 0;
    transform: scale(0.8);
    animation: expandLegacyMicro 1.5s cubic-bezier(0.25, 1, 0.5, 1) 1.5s forwards;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  
  .logo-legacy { color: #ffffff; }
  .logo-micro { color: var(--accent); }

  @keyframes expandLegacyMicro {
    0% { opacity: 0; transform: scale(0.8) translateY(10px); letter-spacing: -2px; }
    100% { opacity: 1; transform: scale(1) translateY(0); letter-spacing: -0.5px; }
  }

  /* 3. Trusted State (Hover) */
  .logo-trusted-state {
    position: absolute;
    display: flex;
    align-items: baseline;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    color: #ffffff;
  }
  .logo-tr, .logo-sted { color: var(--accent); }
  .logo-trusted-mu {
    color: var(--accent);
    font-family: 'Times New Roman', Times, serif;
    font-style: italic;
    font-size: 1.15em;
    margin: 0 0.05em;
  }

  /* 4. Hover Interactions */
  .nav-logo:hover .logo-legacy-micro {
    opacity: 0;
    transform: translateY(-10px) scale(0.95);
  }
  
  .nav-logo:hover .logo-trusted-state {
    opacity: 1;
    transform: translateY(0);
  }

  /* Subtitle with slight shift */
  .logo-subtitle {
    font-size: 0.48em; 
    letter-spacing: 1.5px; 
    color: #888; 
    font-weight: 600; 
    margin-top: 5px;
    transition: transform 0.4s ease;
  }

  .nav-logo:hover .logo-subtitle {
    /* Shifts right slightly to center under Trμsted */
    transform: translateX(2px);
    color: #aaa;
  }

</style>
</head>
<body>

  <a href="#" class="nav-logo">
    <img src="assets/lm-logo.svg" alt="LM Logo" style="height: 38px; margin-right: 12px; opacity: 0; animation: fadeIn 1s 1.5s forwards;">
    <div class="logo-text-wrapper">
      <div class="logo-top-line">
        <!-- The Initial Greek U -->
        <span class="logo-init-mu">&#956;</span>
        
        <!-- The Main Text -->
        <span class="logo-legacy-micro">
          <span class="logo-legacy">LEGACY</span>
          <span class="logo-micro">MICRO</span>
        </span>
        
        <!-- The Hover Text -->
        <span class="logo-trusted-state">
          <span class="logo-tr">Tr</span><span class="logo-trusted-mu">&#956;</span><span class="logo-sted">sted</span>
        </span>
      </div>
      <span class="logo-subtitle">ELECTRONIC COMPONENTS</span>
    </div>
  </a>

  <style>
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</body>
</html>
