<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: black; color: white; margin: 100px; font-size: 50px; font-weight: bold; font-family: sans-serif; }
        .logo-legacy {
            color: #ffffff;
            display: inline-block;
            animation: turnGold 2s ease forwards 5s;
        }
        @keyframes turnGold {
            0% { color: #ffffff; text-shadow: none; }
            100% { color: #fbbf24; text-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        }
    </style>
</head>
<body>
    <span class="logo-legacy">LEGACY</span>
</body>
</html>
